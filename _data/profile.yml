  description: |
    <p> I am working under the guidance of Prof. S. Umesh on multilingual and low-resource Text-to-Speech (TTS) and Voice Conversion systems. Responsibilities include developing and optimizing diffusion-based TTS models for Indian languages as part of the Speech Technologies in Indian Languages project, analyzing and modifying the F5-TTS architecture for low-resource multilingual adaptation, and focusing on improving duration modeling, alignment stability, and overall system performance.
    </p>
